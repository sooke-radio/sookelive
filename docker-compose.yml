services:
  payload:
    build:
      context: .
      # RUN steps need to resolve the "mongodb" service name (via Docker's
      # embedded DNS) to match the hostname used at runtime below, so a
      # single DATABASE_URI works for both. BuildKit's build.network only
      # accepts default/none/host - not arbitrary bridge networks - so
      # reaching sookelive-network requires the active buildx builder
      # itself to be attached to it (see the "ensure buildx builder" step
      # in deploy.yml), and this is left as the (buildkit) default.
      args:
        MIGRATE: false   # run payload migrate
        DATABASE_URI: ${DATABASE_URI:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-payload}?authSource=admin}
    container_name: ${CONTAINER_NAME:-sookelive-payload}
    networks:
      - sookelive-network
    # Port mapping removed for security - Caddy reverse proxy handles external access
    # If you need direct access during development, uncomment the line below:
    # ports:
    #   - ${APP_PORT:-3000}:3000
    volumes:
      - web_media:/app/public/media
    env_file:
      - .env
    environment:
      # Connect to MongoDB via container name (mongodb service in docker-compose.mongodb.yml)
      # To use external database, set DATABASE_URI in .env and this will be ignored
      - DATABASE_URI=${DATABASE_URI:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-payload}?authSource=admin}
    restart: always

networks:
  sookelive-network:
    name: sookelive-network
    external: true

volumes:
  web_media: