services:
  payload:
    build:
      context: .
      network: host # mongodb publishes 127.0.0.1:27017 (see docker-compose.mongodb.yml) so the build can reach it over localhost
      args:
        MIGRATE: false   # run payload migrate
        # Build runs on the host network (see above), not sookelive-network, so it must use
        # localhost here rather than the "mongodb" service name used at runtime below.
        DATABASE_URI: ${DATABASE_URI:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@localhost:27017/${MONGO_DATABASE:-payload}?authSource=admin}
    container_name: ${CONTAINER_NAME:-sookelive-payload}
    networks:
      - sookelive-network
    # Port mapping removed for security - Caddy reverse proxy handles external access
    # If you need direct access during development, uncomment the line below:
    # ports:
    #   - ${APP_PORT:-3000}:3000
    volumes:
      - web_media:/app/public/media
    env_file:
      - .env
    environment:
      # Connect to MongoDB via container name (mongodb service in docker-compose.mongodb.yml)
      # To use external database, set DATABASE_URI in .env and this will be ignored
      - DATABASE_URI=${DATABASE_URI:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-payload}?authSource=admin}
    restart: always

networks:
  sookelive-network:
    name: sookelive-network
    external: true

volumes:
  web_media: