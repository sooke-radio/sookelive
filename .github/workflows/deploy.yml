name: Deploy

on:
  push:
    branches:
      - stg
      - prd # todo: consolidate deploy workflows

jobs:
  stg-deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.ref == 'refs/heads/prd' && 'prd' || 'stg' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh/
           printf '%s\n' "$SSH_PRIVATE_KEY" > ../private.key
          sudo chmod 600 ../private.key
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{secrets.SSH_PRIVATE_KEY}}
          SSH_KNOWN_HOSTS: ${{secrets.SSH_KNOWN_HOSTS}}
          SSH_KEY_PATH: ${{ github.workspace }}/../private.key

      - name: Deploy code
        run: rsync -avz -e "ssh -i ../private.key" -p {{ vars.SSH_PORT }} ./ autobot@${{ vars.DEPLOY_IP }}:${{ vars.DEPLOY_PATH }} --exclude=.git --exclude=.secrets

      - name: Deploy secrets securely
        run: |
          ssh -i ../private.key -p {{ vars.SSH_PORT }} autobot@${{ vars.DEPLOY_IP }} bash << EOF
            set -e
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            DEPLOY_IP="${{ vars.DEPLOY_IP }}"
            DB_PORT="${{ vars.DB_PORT }}"
            DB_NAME="${{ vars.DB_NAME }}"
            MONGO_ROOT_USERNAME="${{ vars.MONGO_ROOT_USERNAME || 'admin' }}"
            MONGO_ROOT_PASSWORD="${{ secrets.MONGO_ROOT_PASSWORD }}"
            MONGO_DATABASE="${{ vars.MONGO_DATABASE || 'payload' }}"
            PAYLOAD_SECRET="${{ secrets.PAYLOAD_SECRET }}"
            CRON_SECRET="${{ secrets.CRON_SECRET }}"
            AZURACAST_KEY="${{ secrets.AZURACAST_KEY }}"
            SMTP_PASS="${{ secrets.SMTP_PASS }}"
            BRANCH_NAME="${{ github.ref_name }}"

            # Strip any previously written secrets from the rsync'd .env, then append fresh values
            # This keeps non-secret vars from the repo's .env while injecting secrets idempotently
            SECRET_KEYS="DATABASE_URI|MONGO_ROOT_USERNAME|MONGO_ROOT_PASSWORD|MONGO_DATABASE|PAYLOAD_SECRET|CRON_SECRET|AZURACAST_KEY|SMTP_PASS"
            sed -i -E "/^($SECRET_KEYS)=/d" "\$DEPLOY_PATH/.env" 2>/dev/null || true

            {
              echo ""
              echo "# Secrets injected by GitHub Actions - DO NOT EDIT MANUALLY"
              echo "DATABASE_URI=mongodb://\${DEPLOY_IP}:\${DB_PORT}/\${DB_NAME}"
              echo "MONGO_ROOT_USERNAME=\${MONGO_ROOT_USERNAME}"
              echo "MONGO_ROOT_PASSWORD=\${MONGO_ROOT_PASSWORD}"
              echo "MONGO_DATABASE=\${MONGO_DATABASE}"
              echo "PAYLOAD_SECRET=\${PAYLOAD_SECRET}"
              echo "CRON_SECRET=\${CRON_SECRET}"
              echo "AZURACAST_KEY=\${AZURACAST_KEY}"
              echo "SMTP_PASS=\${SMTP_PASS}"
            } >> "\$DEPLOY_PATH/.env"

            chmod 600 "\$DEPLOY_PATH/.env"
            echo "Secrets injected into \$DEPLOY_PATH/.env"
          EOF

      - name: Build & Run
        run: |
          ssh -i ../private.key autobot@${{ vars.DEPLOY_IP }} << 'EOF'
            set -e
            cd ${{ vars.DEPLOY_PATH }}

            # Ensure MongoDB is running first
            docker compose -f docker-compose.mongodb.yml up -d

            # Wait for MongoDB to be healthy (up to 60s)
            timeout 60 sh -c 'until docker inspect --format="{{.State.Health.Status}}" $(docker compose -f docker-compose.mongodb.yml ps -q mongodb) 2>/dev/null | grep -q healthy; do sleep 2; done'
            echo "MongoDB is healthy"

            # Build and start application
            docker compose up -d --build

            # Verify container reaches running state (up to 120s)
            timeout 120 sh -c 'until [ "$(docker inspect --format="{{.State.Status}}" sookelive-payload 2>/dev/null)" = "running" ]; do sleep 3; done'
            echo "Deploy successful"

            # Optionally start Caddy if using docker-compose.caddy.yml
            # docker compose -f docker-compose.caddy.yml up -d || true
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ../private.key
